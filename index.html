<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almasa Awareness | Ultimate Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Cairo:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

    <style>
        :root {
            --primary-cyan: #00f2fe;
            --accent-gold: #ffd700;
            --bg-dark: #060b13;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-strong: rgba(255, 255, 255, 0.12);
            --text: #ffffff;
            --font-main: 'Poppins', sans-serif;
            --font-ar: 'Cairo', sans-serif;
        }

        body.light-mode {
            --bg-dark: #f8f9fa;
            --text: #1a1a1a;
            --glass: rgba(0, 0, 0, 0.05);
            --glass-strong: rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.3s ease; }
        
        body {
            background-color: var(--bg-dark);
            color: var(--text);
            font-family: var(--font-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        #particles-js {
            position: fixed; width: 100%; height: 100%; z-index: -1;
        }

        .top-nav {
            position: fixed; top: 20px; width: 100%;
            display: flex; justify-content: space-between; padding: 0 30px; z-index: 1000;
        }

        .custom-select {
            position: relative; display: inline-block;
        }

        .select-styled {
            background: var(--glass);
            border: 1px solid var(--glass-strong);
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            font-weight: bold;
            display: flex; align-items: center; gap: 10px;
        }

        .select-options {
            position: absolute; top: 110%; left: 0;
            background: rgba(13, 27, 51, 0.95);
            border: 1px solid var(--primary-cyan);
            border-radius: 15px;
            width: 120px;
            display: none;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .select-options div {
            padding: 12px; cursor: pointer; text-align: center;
        }

        .select-options div:hover { background: var(--primary-cyan); color: #000; }

        .theme-toggle {
            width: 45px; height: 45px; border-radius: 50%;
            background: var(--glass); border: 1px solid var(--glass-strong);
            color: var(--text); cursor: pointer; backdrop-filter: blur(10px);
        }

        .main-container {
            width: 90%; max-width: 480px; padding-top: 80px; text-align: center; z-index: 10;
        }

        .logo-wrapper {
            width: 140px; height: 140px; margin: 0 auto 30px;
            position: relative;
        }

        .logo-circle {
            width: 100%; height: 100%; border-radius: 50%;
            background: var(--bg-dark);
            border: 4px solid var(--primary-cyan);
            box-shadow: 0 0 30px var(--primary-cyan);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        .logo-circle img { width: 70%; filter: drop-shadow(0 0 5px var(--primary-cyan)); }

        h1 { font-family: 'Orbitron', sans-serif; font-size: 1.8rem; margin-bottom: 10px; letter-spacing: 2px; }
        .bio { font-size: 0.95rem; opacity: 0.8; margin-bottom: 40px; line-height: 1.6; }

        .links-group { display: grid; gap: 20px; }

        .btn-card {
            background: var(--glass);
            border: 1px solid var(--glass-strong);
            padding: 16px 25px;
            border-radius: 18px;
            text-decoration: none; color: var(--text);
            display: flex; align-items: center; justify-content: space-between;
            backdrop-filter: blur(15px);
            transform: translateY(0);
        }

        .btn-card:hover {
            border-color: var(--primary-cyan);
            background: rgba(0, 242, 254, 0.1);
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .btn-icon { width: 45px; height: 45px; background: rgba(0,242,254,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--primary-cyan); font-size: 1.2rem; }
        .btn-info { text-align: left; flex: 1; margin-left: 15px; }
        .btn-title { font-weight: bold; display: block; }
        .btn-sub { font-size: 0.75rem; opacity: 0.6; }

        .socials { margin-top: 50px; display: flex; justify-content: center; gap: 20px; }
        .socials a { font-size: 1.6rem; color: var(--text); opacity: 0.6; }
        .socials a:hover { opacity: 1; color: var(--primary-cyan); transform: scale(1.2); }

        .rtl { direction: rtl; }
        .rtl .btn-info { text-align: right; margin-left: 0; margin-right: 15px; }
        .rtl .btn-icon { margin-left: 0; }

    </style>
</head>
<body id="main-body">

    <div id="particles-js"></div>

    <div class="top-nav">
        <div class="custom-select">
            <div class="select-styled" onclick="toggleDrop()"><i class="fas fa-globe"></i> <span id="current-lang">EN</span></div>
            <div class="select-options" id="drop-menu">
                <div onclick="setLang('en')">EN</div>
                <div onclick="setLang('ar')">AR</div>
            </div>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon"></i></button>
    </div>

    <div class="main-container">
        <div class="logo-wrapper">
            <div class="logo-circle">
                <i class="fas fa-gem" style="font-size: 4rem; color: var(--primary-cyan);"></i>
            </div>
        </div>

        <h1 id="title">Almasa Awareness</h1>
        <p class="bio" id="bio">Building the awareness of the future today. Modern, aesthetic, and sustainable vision.</p>

        <div class="links-group">
            <a href="https://tr.ee/eJjD7EEDty" target="_blank" class="btn-card" onclick="hit()">
                <div class="btn-icon"><i class="fas fa-coins"></i></div>
                <div class="btn-info">
                    <span class="btn-title" id="l1-t">Money Language Academy</span>
                    <span class="btn-sub" id="l1-s">Your path to wealth and mindset</span>
                </div>
                <i class="fas fa-chevron-right" style="opacity: 0.3;"></i>
            </a>

            <a href="https://t.me/almasa_awareness" target="_blank" class="btn-card" onclick="hit()">
                <div class="btn-icon"><i class="fab fa-telegram-plane"></i></div>
                <div class="btn-info">
                    <span class="btn-title">Telegram</span>
                    <span class="btn-sub" id="l2-s">Join our global community</span>
                </div>
                <i class="fas fa-chevron-right" style="opacity: 0.3;"></i>
            </a>

            <a href="https://www.instagram.com/almasa_awareness?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==" target="_blank" class="btn-card" onclick="hit()">
                <div class="btn-icon"><i class="fab fa-instagram"></i></div>
                <div class="btn-info">
                    <span class="btn-title">Instagram</span>
                    <span class="btn-sub" id="l3-s">Daily dose of awareness</span>
                </div>
                <i class="fas fa-chevron-right" style="opacity: 0.3;"></i>
            </a>
        </div>

        <div class="socials">
            <a href="#"><i class="fab fa-twitter"></i></a>
            <a href="#"><i class="fab fa-tiktok"></i></a>
            <a href="#"><i class="fab fa-discord"></i></a>
        </div>
    </div>

    <script>
        const dict = {
            ar: { bio: "نبني وعي المستقبل اليوم. رؤية حديثة وجمالية ومستدامة.", l1t: "أكاديمية لغة المال", l1s: "طريقك نحو الثراء والوعي المالي", l2s: "انضم إلى مجتمعنا العالمي", l3s: "جرعة يومية من الوعي" },
            en: { bio: "Building the awareness of the future today. Modern, aesthetic, and sustainable vision.", l1t: "Money Language Academy", l1s: "Your path to wealth and mindset", l2s: "Join our global community", l3s: "Daily dose of awareness" }
        };

        function toggleDrop() {
            const menu = document.getElementById('drop-menu');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        }

        function setLang(l) {
            document.getElementById('current-lang').innerText = l.toUpperCase();
            document.getElementById('bio').innerText = dict[l].bio;
            document.getElementById('l1-t').innerText = dict[l].l1t;
            document.getElementById('l1-s').innerText = dict[l].l1s;
            document.getElementById('l2-s').innerText = dict[l].l2s;
            document.getElementById('l3-s').innerText = dict[l].l3s;
            document.getElementById('main-body').className = l === 'ar' ? 'rtl' : '';
            toggleDrop();
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const icon = document.querySelector('.theme-toggle i');
            icon.className = document.body.classList.contains('light-mode') ? 'fas fa-sun' : 'fas fa-moon';
        }

        function hit() {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#00f2fe', '#ffffff', '#ffd700'] });
        }

        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 60 },
                "color": { "value": "#00f2fe" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.4 },
                "size": { "value": 3 },
                "line_linked": { "enable": true, "distance": 150, "color": "#00f2fe", "opacity": 0.2, "width": 1 },
                "move": { "enable": true, "speed": 1.5 }
            }
        });
    </script>
</body>
</html>
